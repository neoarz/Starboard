services:
  starboard:
    build:
      context: .
    image: starboard:local
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DISCORD_TOKEN: ${DISCORD_TOKEN:?Set DISCORD_TOKEN in .env}
      BOT_ID: ${BOT_ID:?Set BOT_ID in .env}
      SHARDS: ${SHARDS:-1}
      DEVELOPMENT: ${DEVELOPMENT:-true}
      OWNER_IDS: ${OWNER_IDS:-}
      DB_MAX_DB_CONNECTIONS: ${DB_MAX_DB_CONNECTIONS:-10}
      PATREON_TOKEN: ${PATREON_TOKEN:-}
      SENTRY_URL: ${SENTRY_URL:-}
      MAIN_GUILD: ${MAIN_GUILD:-}
      ERROR_CHANNEL_ID: ${ERROR_CHANNEL_ID:-}
      PATRON_ROLE: ${PATRON_ROLE:-}
      SUPPORTER_ROLE: ${SUPPORTER_ROLE:-}
      PROXY: ${PROXY:-}
      SB_DATABASE_URL: ${SB_DATABASE_URL:-}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-starboard}
      POSTGRES_USER: ${POSTGRES_USER:-starboard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-starboard}
      POSTGRES_USER: ${POSTGRES_USER:-starboard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres-data:
